name: Scrape and Deploy

on:
  schedule:
    - cron: '0 18 * * *'  # 6am NZT (UTC+12) daily
  workflow_dispatch:       # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Export data to JSON
        run: python export_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.db listings_data.json weekly_summary.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "data: scrape $(date -u '+%Y-%m-%d')"
          git push

      - name: Trigger Netlify deploy
        run: curl -s -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
